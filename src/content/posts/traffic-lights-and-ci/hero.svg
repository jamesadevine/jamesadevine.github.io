<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">Traffic lights and product health</title>
  <desc id="desc">A CI pipeline moves from overlapping red, yellow, and green signals to a decisive red-or-green release gate.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#243040"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity=".055"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity=".28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1l10 5-10 5z" fill="#cbd5e1"/>
    </marker>
  </defs>

  <rect width="1200" height="600" fill="url(#background)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <g font-family="Segoe UI, sans-serif">
    <text x="72" y="82" fill="#ffffff" font-size="38" font-weight="700">Can you trust the signal?</text>
    <text x="72" y="118" fill="#cbd5e1" font-size="19">CI should make release health unambiguous.</text>

    <g filter="url(#shadow)">
      <rect x="72" y="170" width="400" height="310" rx="12" fill="#182230" stroke="#64748b" stroke-opacity=".65"/>
      <rect x="728" y="170" width="400" height="310" rx="12" fill="#182230" stroke="#64748b" stroke-opacity=".65"/>
    </g>

    <text x="104" y="216" fill="#94a3b8" font-size="15" font-weight="700" letter-spacing="2">FUZZY SIGNALS</text>
    <text x="760" y="216" fill="#94a3b8" font-size="15" font-weight="700" letter-spacing="2">TRUSTED SIGNALS</text>

    <g transform="translate(126 262)">
      <path d="M0 62H274" stroke="#64748b" stroke-width="4" stroke-dasharray="8 10"/>
      <circle cx="58" cy="62" r="48" fill="#dc2626" fill-opacity=".9"/>
      <path d="M39 43l38 38m0-38L39 81" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
      <circle cx="137" cy="62" r="48" fill="#d67f3c" fill-opacity=".9"/>
      <path d="M137 37v31" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
      <circle cx="137" cy="84" r="5" fill="#ffffff"/>
      <circle cx="216" cy="62" r="48" fill="#16803c" fill-opacity=".9"/>
      <path d="M193 63l16 16 31-36" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="272" y="405" fill="#f8fafc" font-size="20" text-anchor="middle">Known failure? Infrastructure?</text>
    <text x="272" y="438" fill="#fbbf24" font-size="19" font-weight="600" text-anchor="middle">Someone has to interpret it.</text>

    <path d="M516 325H672" fill="none" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="594" y="295" fill="#e2e8f0" font-size="16" font-weight="600" text-anchor="middle">DE-FUZZ</text>
    <text x="594" y="365" fill="#94a3b8" font-size="14" text-anchor="middle">root cause</text>
    <text x="594" y="387" fill="#94a3b8" font-size="14" text-anchor="middle">every failure</text>

    <g transform="translate(783 262)">
      <path d="M0 62H290" stroke="#64748b" stroke-width="4"/>
      <circle cx="64" cy="62" r="48" fill="#dc2626"/>
      <path d="M45 43l38 38m0-38L45 81" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
      <rect x="130" y="28" width="52" height="68" rx="8" fill="#0f172a" stroke="#cbd5e1" stroke-width="3"/>
      <path d="M143 62h26" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
      <circle cx="226" cy="62" r="48" fill="#16803c"/>
      <path d="M203 63l16 16 31-36" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="928" y="405" fill="#f8fafc" font-size="20" font-weight="600" text-anchor="middle">Fail or release.</text>
    <text x="928" y="438" fill="#86efac" font-size="19" font-weight="600" text-anchor="middle">The signal is the decision.</text>

    <text x="1168" y="574" fill="#ffffff" fill-opacity=".4" font-size="11" font-style="italic" text-anchor="end">agent generated</text>
  </g>
</svg>